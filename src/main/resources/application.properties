spring.application.name=ecom

management.endpoints.jmx.exposure.incode=*

spring.datasource.username=sa
spring.datasource.password=root
spring.datasource.url=jdbc:sqlserver://localhost;databaseName=ecom;encrypt=true;trustServerCertificate=true

spring.jpa.hibernate.ddl-auto=update

encryption.salt.rounds=10

jwt.algorithm.key=SuperSecureSecretKey
jwt-issuer=eCommerce
expiryInSeconds=604800

#Email configuration
email.from=no-reply2ecommerce.com

#General configuration
app.frontend.url=http://ecommerce.com

# SMTP configuration
spring.mail.host=localhost
spring.mail.port=25
